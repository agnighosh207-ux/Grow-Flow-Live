<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Preload critical fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://api.clerk.com" crossorigin>
    <link rel="preconnect" href="https://growflowai.space" crossorigin>
    <link rel="dns-prefetch" href="https://openrouter.ai">

    <!-- DNS prefetch for payment -->
    <link rel="dns-prefetch" href="https://checkout.razorpay.com">
    <link rel="dns-prefetch" href="https://api.razorpay.com">

    <!-- Preload the main CSS -->
    <link rel="preload" href="/src/index.css" as="style">

    <title>Grow Flow AI — The AI Growth Engine for Creators & Brands</title>
    
    <!-- Primary Meta Tags -->
    <meta name="title" content="Grow Flow AI — The AI Growth Engine for Creators & Brands" />
    <meta name="description" content="GrowFlow AI — Generate viral content for Instagram, YouTube, Twitter and LinkedIn in seconds. AI-powered content creator tools." />
    <meta name="keywords" content="AI content generator, social media AI, Instagram caption generator, LinkedIn posts AI, viral content tool, social media automation" />
    <meta name="author" content="Grow Flow AI" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <link rel="canonical" href="https://growflowai.space" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0A0A0F" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#0A0A0F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GrowFlow AI" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:site_name" content="Grow Flow AI" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://growflowai.space" />
    <meta property="og:title" content="GrowFlow AI — AI Content Generator" />
    <meta property="og:description" content="Create platform-perfect viral content in seconds with AI." />
    <meta property="og:image" content="https://growflowai.space/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Grow Flow AI - Content Generation Engine Preview" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://growflowai.space" />
    <meta name="twitter:title" content="GrowFlow AI" />
    <meta name="twitter:description" content="Generate viral content for every platform in seconds." />
    <meta name="twitter:image" content="https://growflowai.space/opengraph.jpg" />
    <meta name="twitter:creator" content="@growflowai" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "GrowFlow AI",
      "applicationCategory": "BusinessApplication",
      "description": "AI-powered content generation tool for Indian social media creators. Generate viral captions, hooks, and strategies in seconds.",
      "url": "https://growflowai.space",
      "offers": {
        "@type": "Offer",
        "price": "149",
        "priceCurrency": "INR"
      },
      "operatingSystem": "Web",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "127"
      }
    }
    </script>
  </head>
  <body>
    <div id="app-loading" style="
      position: fixed; inset: 0; 
      background: #0A0A0F; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    ">
      <div style="text-align: center;">
        <div style="
          width: 48px; height: 48px; 
          border: 2px solid rgba(94,106,210,0.3); 
          border-top-color: #5E6AD2;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
          margin: 0 auto 16px;
        "></div>
        <p style="color: #9B9BA8; font-size: 13px; font-family: system-ui, sans-serif;">
          Loading GrowFlow AI...
        </p>
      </div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
