<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="growflow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" /> <!-- violet-500 -->
      <stop offset="100%" stop-color="#7e22ce" /> <!-- purple-700 -->
    </linearGradient>
    
    <filter id="inner-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer glowing background squircle -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="transparent" />
  
  <!-- The main container -->
  <rect x="24" y="24" width="464" height="464" rx="116" fill="url(#growflow-gradient)" />

  <!-- Inner glowing line on top edge for 3D feel -->
  <path d="M 140 28 L 372 28 Q 480 28 484 136" stroke="white" stroke-width="4" stroke-opacity="0.3" fill="none" stroke-linecap="round" />

  <!-- Trending Up Icon centered -->
  <g transform="translate(136, 136) scale(10)" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#inner-glow)">
    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
    <polyline points="17 6 23 6 23 12" />
  </g>
</svg>
