packages:
  - frontend
  - backend
  - lib/*
  - lib/integrations/*
  - scripts

autoInstallPeers: false

catalog:
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.6.0
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.1
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.1.0
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: ^4.21.0
  vite: ^7.3.0
  zod: ^3.24.0
# ============================================================================
# SECURITY: Minimum release age for npm packages (supply-chain attack defense)
# ============================================================================
# Requires any npm package version to be published for at least 1 day before
# pnpm will allow installing it. Defense against supply-chain attacks.
# ============================================================================
minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  # Clerk packages - trusted organization, needed for version compatibility
  - '@clerk/shared'
  - '@clerk/react'

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver

overrides:
  '@clerk/backend@>=3.0.0 <=3.2.13': '>=3.2.14'
  '@clerk/clerk-react@>=5.9.0 <=5.61.5': '>=5.61.6'
  '@clerk/express@>=2.0.0 <=2.1.5': '>=2.1.6'
  '@clerk/react@>=6.0.0 <=6.4.2': '>=6.4.3'
  '@clerk/shared@>=3.0.0 <=3.47.4': '>=3.47.5'
  '@clerk/shared@>=3.0.0-canary.v20250225091530 <3.47.4': '>=3.47.4'
  '@clerk/shared@>=4.0.0 <4.8.1': '>=4.8.1'
  '@clerk/shared@>=4.0.0 <=4.8.2': '>=4.8.3'
  "@esbuild-kit/esm-loader": "npm:tsx@^4.21.0"
  '@opentelemetry/exporter-prometheus@<0.217.0': '>=0.217.0'
  '@opentelemetry/sdk-node@<0.217.0': '>=0.217.0'
  '@protobufjs/utf8@<=1.1.0': '>=1.1.1'
